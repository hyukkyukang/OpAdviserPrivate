[database]
# Database type: mysql or postgresql
db = mysql

# Connection settings
host = localhost
port = 3306
user = root
passwd = password
sock = /var/run/mysqld/mysqld.sock

# MySQL configuration file path
cnf = scripts/template/experiment_normandy.cnf

# Path to mysqld binary
mysqld = /usr/sbin/mysqld

# PostgreSQL settings (if using PostgreSQL)
pg_ctl = /usr/bin/pg_ctl
pgdata = /var/lib/postgresql/data
postgres = /usr/bin/postgres

#############################################
# CPU/IO FOCUSED: Use custom knob file
# Contains only 39 CPU and Disk I/O related knobs
#############################################
knob_config_file = scripts/experiment/gen_knobs/mysql_cpu_io_40.json
knob_num = 39

# Workload settings - MODIFY THESE FOR YOUR WORKLOAD
dbname = sbrw
workload = sysbench
oltpbench_config_xml = 
workload_type = sbrw
thread_num = 80

# Benchmark timing (moderate for good measurements)
workload_warmup_time = 10
workload_time = 120

# Mode settings
remote_mode = False
ssh_user = 
# Note: online_mode=False to test knobs that require restart
online_mode = False
isolation_mode = False
pid = 0
lhs_log = 
cpu_core = 

[tune]
# Task identifier
task_id = sbrw_cpu_io_opadviser

# Optimization target
performance_metric = ['tps']
reference_point = [None, None]
constraints = 

#############################################
# OPADVISER SETTINGS
# Transfer learning enabled
#############################################
max_runs = 50
optimize_method = DDPG
space_transfer = True
auto_optimizer = False

# Knob selection settings
selector_type = shap
initial_runs = 10
initial_tunable_knob_num = 39
incremental = none
incremental_every = 10
incremental_num = 2

# Optimizer settings
acq_optimizer_type = local_random
batch_size = 16
mean_var_file = 
params = 
tr_init = True
replay_memory = 

# Transfer learning
transfer_framework = none
data_repo = repo

only_knob = False
only_range = False
latent_dim = 0

