[database]
# Database type: mysql or postgresql
db = mysql

# Connection settings
host = localhost
port = 3306
user = root
passwd = password
sock = /var/run/mysqld/mysqld.sock

# MySQL configuration file path
cnf = scripts/template/experiment_normandy.cnf

# Path to mysqld binary
mysqld = /usr/sbin/mysqld

# PostgreSQL settings (if using PostgreSQL)
pg_ctl = /usr/bin/pg_ctl
pgdata = /var/lib/postgresql/data
postgres = /usr/bin/postgres

# Knob configuration
knob_config_file = scripts/experiment/gen_knobs/mysql_all_197_32G.json
#############################################
# SPEED OPTIMIZATION: Reduce number of knobs
# Original: 197 knobs, Fast: 20 knobs
#############################################
knob_num = 20

# Workload settings - MODIFY THESE FOR YOUR WORKLOAD
dbname = sbrw
workload = sysbench
oltpbench_config_xml = 
workload_type = sbrw
thread_num = 80

#############################################
# SPEED OPTIMIZATION: Reduce benchmark time
# Original: 180s run + 10s warmup = ~3.5 min/iter
# Fast: 60s run + 5s warmup = ~1.5 min/iter
#############################################
workload_warmup_time = 5
workload_time = 60

# Remote and online mode settings
remote_mode = False
ssh_user = 
#############################################
# SPEED OPTIMIZATION: Use online mode
# No MySQL restart between iterations (much faster)
# Note: Some knobs require restart, they'll be skipped
#############################################
online_mode = True
isolation_mode = False
pid = 0
lhs_log = 
cpu_core = 

[tune]
# Task identifier - results saved as history_<task_id>.json
task_id = sbrw_ground_truth_fast

# Optimization target (maximize TPS)
performance_metric = ['tps']
reference_point = [None, None]
constraints = 

#############################################
# SPEED OPTIMIZATION: Reduce iterations
# Original: 500 iterations (~25+ hours)
# Fast: 100 iterations (~2.5 hours)
#############################################
max_runs = 100
optimize_method = SMAC
space_transfer = False
auto_optimizer = False

# Knob selection settings
selector_type = shap
initial_runs = 5
initial_tunable_knob_num = 20
incremental = none
incremental_every = 10
incremental_num = 2

# Optimizer settings
acq_optimizer_type = local_random
batch_size = 16
mean_var_file = 
params = 
tr_init = True
replay_memory = 

# Transfer learning (disabled for ground truth)
transfer_framework = none
data_repo = repo

# OpAdviser settings (disabled for ground truth)
only_knob = False
only_range = False
latent_dim = 0

