[database]
# Database type: mysql or postgresql
db = mysql

# Connection settings
host = localhost
port = 3306
user = root
passwd = password
sock = /var/run/mysqld/mysqld.sock

# MySQL configuration file path
cnf = scripts/template/experiment_normandy.cnf

# Path to mysqld binary
mysqld = /usr/sbin/mysqld

# PostgreSQL settings (if using PostgreSQL)
pg_ctl = /usr/bin/pg_ctl
pgdata = /var/lib/postgresql/data
postgres = /usr/bin/postgres

#############################################
# CPU/IO ULTRA-FAST: 15 dynamically changeable CPU/IO knobs
#############################################
knob_config_file = scripts/experiment/gen_knobs/mysql_cpu_io_dynamic_15.json
knob_num = 15

# Workload settings
dbname = sbrw
workload = sysbench
oltpbench_config_xml = 
workload_type = sbrw
thread_num = 40

#############################################
# ULTRA-FAST: Minimal benchmark time
# 30s run + 5s warmup = ~35s per iteration
#############################################
workload_warmup_time = 5
workload_time = 30

# Use online mode (only dynamic knobs, no MySQL restart)
remote_mode = False
ssh_user = 
online_mode = True
isolation_mode = False
pid = 0
lhs_log = 
cpu_core = 

[tune]
task_id = sbrw_cpu_io_opadviser_ultrafast

performance_metric = ['tps']
reference_point = [None, None]
constraints = 

#############################################
# CPU/IO ULTRA-FAST: 40 iterations (~25 minutes)
# OpAdviser should find good config faster than ground truth
#############################################
max_runs = 40
optimize_method = DDPG
space_transfer = True
auto_optimizer = False

selector_type = shap
initial_runs = 5
initial_tunable_knob_num = 15
incremental = none
incremental_every = 10
incremental_num = 2

acq_optimizer_type = local_random
batch_size = 8
mean_var_file = 
params = 
tr_init = True
replay_memory = 

transfer_framework = none
data_repo = repo

only_knob = False
only_range = False
latent_dim = 0

