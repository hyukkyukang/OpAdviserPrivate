[database]
# Database type: mysql or postgresql
db = mysql

# Connection settings
host = localhost
port = 3306
user = root
passwd = password
sock = /var/run/mysqld/mysqld.sock

# MySQL configuration file path
cnf = scripts/template/experiment_normandy.cnf

# Path to mysqld binary
mysqld = /usr/sbin/mysqld

# PostgreSQL settings (if using PostgreSQL)
pg_ctl = /usr/bin/pg_ctl
pgdata = /var/lib/postgresql/data
postgres = /usr/bin/postgres

#############################################
# CPU/IO FOCUSED: Use custom knob file
# Contains only 39 CPU and Disk I/O related knobs
#############################################
knob_config_file = scripts/experiment/gen_knobs/mysql_cpu_io_40.json
knob_num = 39

# Workload settings - MODIFY THESE FOR YOUR WORKLOAD
dbname = sbrw
workload = sysbench
oltpbench_config_xml = 
workload_type = sbrw
thread_num = 80

#############################################
# 10-MINUTE CONFIG: Aggressive time savings
# Target: Complete in under 10 minutes (600s)
# Per iteration: 30s benchmark + 5s warmup + ~5s opt = ~40s
# Total: 12 iterations × 40s = 480s ≈ 8 minutes
#############################################
workload_warmup_time = 5
workload_time = 30

# Mode settings
remote_mode = False
ssh_user = 
# CRITICAL: online_mode=True skips DB restart (~60s/iter)
# Trade-off: Knobs with dynamic="No" won't take effect
online_mode = True
isolation_mode = False
pid = 0
lhs_log = 
cpu_core = 

[tune]
# Task identifier
task_id = sbrw_cpu_io_opadviser_10min

# Optimization target
performance_metric = ['tps']
reference_point = [None, None]
constraints = 

#############################################
# OPADVISER SETTINGS (10-MINUTE MODE)
# Transfer learning enabled with minimal iterations
#############################################
max_runs = 12
# Alternative: Use runtime_limit for precise time budget (in seconds)
# Tuning stops when either max_runs or runtime_limit is reached
# Example: runtime_limit = 600 (10 minutes)
runtime_limit = 
optimize_method = DDPG
space_transfer = True
auto_optimizer = False

# Knob selection settings
# initial_runs reduced for faster startup
selector_type = shap
initial_runs = 3
initial_tunable_knob_num = 39
incremental = none
incremental_every = 10
incremental_num = 2

# Optimizer settings
acq_optimizer_type = local_random
batch_size = 8
mean_var_file = 
params = 
tr_init = True
replay_memory = 

# Transfer learning
transfer_framework = none
data_repo = repo

only_knob = False
only_range = False
latent_dim = 0


